services:
  web-migration:
    build:
      context: .
    image: web
    container_name: web-migration
    networks:
      - effective-mobile-test
    entrypoint: ["/bin/sh", "-c", "python manage.py migrate"]
    restart: on-failure

  web-collectstatic:
    build:
      context: .
    image: web
    container_name: web-collectstatic
    networks:
      - effective-mobile-test
    entrypoint: ["/bin/sh", "-c", "python manage.py collectstatic --noinput"]
    depends_on:
      web-migration:
        condition: service_completed_successfully
    restart: on-failure
    volumes:
      - ./staticfiles:/app/staticfiles

  web:
    build:
      context: .
    image: web
    container_name: web
    networks:
      - effective-mobile-test
    ports:
      - "8001:8000"
    entrypoint: ["/bin/sh", "-c", "gunicorn effective_mobile_test.wsgi:application --bind 0.0.0.0:8000 --workers ${WORKERS:-1}"]
    depends_on:
      web-collectstatic:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null http://web:8000/admin/login/ || exit 1"]
      start_period: 5s
      interval: 20s
      timeout: 2s
      retries: 3
    restart: always

networks:
  effective-mobile-test:
    driver: bridge