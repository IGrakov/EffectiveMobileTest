services:
  web-migration:
    build:
      target: dev
    env_file:
      - .env.dev
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  web-collectstatic:
    build:
      target: dev
    env_file:
      - .env.dev
    environment:
      - POSTGRES_HOST=postgres

  web:
    build:
      target: dev
    env_file:
      - .env.dev
    networks:
      - effective-mobile-test
    environment:
      - POSTGRES_HOST=postgres
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:18-alpine3.22
    env_file:
      - .env.dev
    networks:
      - effective-mobile-test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
